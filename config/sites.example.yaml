# Copy this file to config/sites.yaml on the NUC and edit it there.
# Keep upstream apps bound to 127.0.0.1 only.

defaults:
  nginxListen: '127.0.0.1:80'
  accessLogDir: '/var/log/nginx'
  staticRootBase: '/opt/nuc-web/sites'

# Optional values used by scripts/render-cloudflared-config.mjs.
# The SSH ingress is intentionally managed by this repo because remote NUC
# access depends on it. Do not remove it unless you have another recovery path.
cloudflared:
  tunnel: REPLACE_WITH_TUNNEL_ID
  credentialsFile: /etc/cloudflared/REPLACE_WITH_TUNNEL_ID.json
  service: http://127.0.0.1:80
  ssh:
    enabled: true
    hostname: ssh.grizzlybulls.com
    service: ssh://localhost:22

sites:
  - key: grizzly-bulls
    enabled: true
    kind: proxy
    hostnames:
      - nuc-grizzly.grizzlybulls.com
      # Add these only when ready for production cutover:
      # - grizzlybulls.com
      # - www.grizzlybulls.com
    upstream: http://127.0.0.1:8080
    healthUrl: http://127.0.0.1:8080/api/health
    healthBodyContains: '"service":"grizzly-bulls"'
    expectedStatus: 200
    expectedBodyContains: Grizzly Bulls
    # Public checks validate the Cloudflare Tunnel / DNS path from the NUC.
    # Enable after public hostnames point through the tunnel.
    publicHealthChecks:
      - url: https://nuc-grizzly.grizzlybulls.com/api/health
        expectedStatus: 200
        expectedBodyContains: '"service":"grizzly-bulls"'
      # Add these only when ready for production cutover:
      # - url: https://grizzlybulls.com/api/health
      #   expectedStatus: 200
      #   expectedBodyContains: '"service":"grizzly-bulls"'
      # - url: https://www.grizzlybulls.com/
      #   expectedStatus: 200
      #   expectedBodyContains: Grizzly Bulls
    notes: Grizzly Bulls Next.js app, deployed by the grizzly-bulls repo.

  - key: example-static
    enabled: false
    kind: static
    hostnames:
      - example.grizzlybulls.com
    # Static deploys are atomic: scripts/deploy-static-site.mjs copies a build
    # into deployRoot/releases/<timestamp> and points root/current at it.
    deployRoot: /opt/nuc-web/sites/example-static
    root: /opt/nuc-web/sites/example-static/current
    index: index.html
    expectedStatus: 200
    expectedBodyContains: Example Static Site
    publicHealthChecks:
      - url: https://example.grizzlybulls.com/
        expectedStatus: 200
        expectedBodyContains: Example Static Site
    notes: Example direct static site served by Nginx.
